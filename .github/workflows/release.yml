name: Release to LuaRocks

on:
  push:
    tags:
      - "v*"

jobs:
  luarocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v6
        with:
          luarocksVersion: "3.13.0"

      - name: Generate rockspec and upload
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          ROCKSPEC="luamigemo-${TAG}-1.rockspec"
          if [ "$ROCKSPEC" != "luamigemo-1.0.0-1.rockspec" ]; then
            sed "s/1.0.0/${TAG}/g" luamigemo-1.0.0-1.rockspec > "$ROCKSPEC"
          fi
          luarocks upload "$ROCKSPEC" --api-key="$LUAROCKS_API_KEY"
